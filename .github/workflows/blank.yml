on:
  workflow_dispatch:
    inputs:
      local_ip:
        description: 'Type your current local IP'
        required: true

jobs:
  display-ip:
    runs-on: windows-latest
    steps:
      - name: Fetch and Compare IPs
        run: |
          echo "The IP I typed in is: ${{ github.event.inputs.local_ip }}"
          echo "The GitHub Runner's IP is actually: $(curl -s https://ifconfig.me)"
