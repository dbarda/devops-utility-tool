name: Colored Hello World

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  print-colors:
    runs-on: ubuntu-latest
    steps:
      - name: Say Hello in Colors
        run: |
          # Define ANSI Color Codes
          RED='\033[0;31m'
          YELLOW='\033[0;33m'
          GREEN='\033[0;32m'
          BLACK='\033[0;30m'
          PINK='\033[0;35m'
          BLUE='\033[0;34m'
          NC='\033[0m' # No Color (Reset)

          echo -e "${RED}Hello World (Red)${NC}"
          echo -e "${YELLOW}Hello World (Yellow)${NC}"
          echo -e "${GREEN}Hello World (Green)${NC}"
          echo -e "${BLACK}Hello World (Black)${NC}"
          echo -e "${PINK}Hello World (Pink)${NC}"
          echo -e "${BLUE}Hello World (Blue)${NC}"
