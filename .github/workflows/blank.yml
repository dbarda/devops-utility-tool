name: Check Runner IP

# This 'on' section tells GitHub WHEN to run 
# You need at least one of these to avoid that error.
on:
  push:
    branches: [ "main" ]    # Runs when you push to the main branch
  workflow_dispatch:        # Adds a manual 'Run' button in the UI

jobs:
  check-ip-job:
    runs-on: ubuntu-latest
    steps:
      - name: Show Public IP
        run: |
          echo "GitHub Runner Public IP is:"
          curl -s https://ifconfig.me
          echo -e "\nNote: This is the cloud runner's IP, not your home IP."
